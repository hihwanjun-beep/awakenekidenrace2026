<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AERC 2026 — 관리자</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
  --text:#f0f0f0;--muted:#777;
  --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
  --red:#ff4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:5rem}
header{padding:1.25rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--accent)}
.admin-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--red);color:#fff;letter-spacing:.08em}
.sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.sync-dot.live{background:#4caf50;box-shadow:0 0 6px #4caf50}
.container{max-width:700px;margin:0 auto;padding:1.25rem}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.page{display:none}.page.active{display:block}
.info-box{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:1.25rem;line-height:1.7}
.race-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem}
.race-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}
.b1{background:#2a2060;color:#a89ff5}.b3{background:#0d3325;color:#5dcaa5}
.b4{background:#3a1a00;color:#f59f5a}.b6{background:#1a003a;color:#c459ef}
.bm{background:#0d2a3a;color:#5bb7eb}.bf{background:#3a0d1e;color:#ed93b1}.bmix{background:#1a3a0d;color:#97c459}
.race-title-txt{font-size:13px;font-weight:500;color:var(--text)}
.group-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.match-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.match-row:last-child{margin-bottom:0}
.crew-btn{flex:1;padding:9px 6px;font-size:12px;font-weight:500;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif}
.crew-btn:hover{border-color:var(--accent);color:var(--accent)}
.crew-btn.winner{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:700}
.crew-btn.loser{opacity:.3}
.vs-lbl{font-size:10px;color:var(--muted);min-width:16px;text-align:center;font-weight:700}
.finalist-section{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.finalist-row{display:flex;gap:6px;flex-wrap:wrap}
.finalist-chip{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--accent-dim);border:0.5px solid var(--accent);color:var(--accent);font-weight:500}
.finalist-chip.empty{background:var(--surface2);border-color:var(--border2);color:var(--muted)}
.group-block{margin-bottom:14px}.group-block:last-child{margin-bottom:0}
.draw-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.draw-col{background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:10px}
.draw-col-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;text-align:center}
.draw-sel{width:100%;font-size:11px;padding:5px 4px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:'Noto Sans KR',sans-serif;margin-bottom:4px;cursor:pointer}
.draw-sel:last-child{margin-bottom:0}
.draw-sel.selected{border-color:var(--accent);color:var(--accent)}
.final-inner{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-top:10px}
.final-crew-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.final-crew-row:last-child{border-bottom:none}
.crew-name-lbl{flex:1;font-size:13px;font-weight:500;color:var(--text)}
select{font-size:13px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.pt-tag{font-size:12px;color:var(--muted);min-width:38px;text-align:right}
.pt-tag.filled{color:var(--accent);font-weight:700}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:1.5rem 0 8px}
.total-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-weight:500;color:var(--muted);padding:6px 4px;text-align:center;border-bottom:0.5px solid var(--border);font-size:10px;line-height:1.4;white-space:nowrap}
th:nth-child(2){text-align:left}
td{padding:8px 4px;border-bottom:0.5px solid var(--border);text-align:center;color:var(--muted)}
td:nth-child(2){text-align:left;font-size:13px;font-weight:700;color:var(--text)}
tr:last-child td{border-bottom:none}
td.has-pt{color:var(--text)}
td.total-pt{text-align:right;font-size:15px;font-weight:700;color:var(--accent)}
tr.rank1 td.total-pt{font-size:18px}
.btn{padding:9px 18px;font-size:13px;font-weight:500;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;margin-right:8px;font-family:'Noto Sans KR',sans-serif}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-p{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:700}
.btn-p:hover{background:#b0d82e;border-color:#b0d82e;color:#0a0a0a}
.btn-danger{border-color:var(--red);color:var(--red)}
.empty-state{font-size:13px;color:var(--muted);padding:4px 0}
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.setup-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;padding:2rem;max-width:480px;width:100%}
.setup-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);margin-bottom:.5rem;letter-spacing:.04em}
.setup-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:1.25rem}
.setup-input{width:100%;padding:10px 12px;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px}
.setup-input:focus{outline:none;border-color:var(--accent)}
code{background:rgba(200,241,53,.12);color:var(--accent);padding:1px 5px;border-radius:4px;font-size:11px}
</style>
</head>
<body>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div class="setup-title">Firebase 연결 설정</div>
    <div class="setup-desc">실시간 동기화를 위해 Firebase 설정을 입력해 주세요.</div>
    <input class="setup-input" id="cfg_apiKey" placeholder="apiKey">
    <input class="setup-input" id="cfg_authDomain" placeholder="authDomain">
    <input class="setup-input" id="cfg_dbURL" placeholder="databaseURL">
    <input class="setup-input" id="cfg_projectId" placeholder="projectId">
    <input class="setup-input" id="cfg_appId" placeholder="appId">
    <div style="margin-top:1rem">
      <button class="btn btn-p" onclick="saveFirebaseConfig()" style="width:100%">연결하기</button>
    </div>
    <div id="cfg_error" style="font-size:12px;color:var(--red);margin-top:8px;display:none"></div>
  </div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">AERC 2026</div>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">연결 대기</span></div>
    <button class="btn btn-danger" style="font-size:11px;padding:5px 12px" onclick="resetAll()">전체 초기화</button>
  </div>
</header>

<div class="container">
  <div class="tab-bar">
    <button class="tab active" onclick="goTab('draw')">① 조 편성</button>
    <button class="tab" onclick="goTab('prelim')">② 예선 승자</button>
    <button class="tab" onclick="goTab('final')">③ 결선 순위</button>
  </div>

  <div id="tab-draw" class="page active">
    <div class="info-box">현장 추첨 결과에 따라 각 레이스의 A·B·C 조에 크루를 배정하세요. (3팀씩 3개 조)</div>
    <div id="draw-content"></div>
    <div style="margin-top:1rem">
      <button class="btn btn-p" onclick="goTab('prelim')">예선 승자 선택 →</button>
    </div>
  </div>

  <div id="tab-prelim" class="page">
    <div class="info-box">각 조에서 이긴 크루를 클릭하세요. 조별 1위가 결선에 진출합니다.</div>
    <div id="prelim-content"></div>
    <div style="margin-top:1rem">
      <button class="btn" onclick="goTab('draw')">← 조 편성 수정</button>
      <button class="btn btn-p" onclick="goTab('final')">결선 순위 입력 →</button>
    </div>
  </div>

  <div id="tab-final" class="page">
    <div class="info-box">결선 진출 3크루의 순위를 선택하세요.<br>모든 부문 동일: 1위 10pt · 2위 6pt · 3위 3pt</div>
    <div id="final-content"></div>
    <div class="sec-lbl">크루 포인트 합계</div>
    <div class="total-card" id="total-block"><div class="empty-state">결선 순위를 입력하면 자동 계산됩니다</div></div>
    <div style="margin-top:1rem"><button class="btn" onclick="goTab('prelim')">← 예선 수정</button></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const ALL_CREWS = ['꼬뮨드서울','NRR','SLVNS','와우산30','EES','RU:SH','정직','낙원','Odyssey Running'];
const RACES = [
  {id:'r0', type:'1v1', label:'1vs1 남자부', b1:'b1', b2:'bm', b2t:'남자'},
  {id:'r1', type:'1v1', label:'1vs1 여자부', b1:'b1', b2:'bf', b2t:'여자'},
  {id:'r2', type:'3v3', label:'3vs3 남자부', b1:'b3', b2:'bm', b2t:'남자'},
  {id:'r3', type:'3v3', label:'3vs3 여자부', b1:'b3', b2:'bf', b2t:'여자'},
  {id:'r4', type:'4v4', label:'4vs4 혼성',   b1:'b4', b2:'bmix', b2t:'혼성'},
  {id:'r5', type:'6v6', label:'6vs6 혼성',   b1:'b6', b2:'bmix', b2t:'혼성'},
];
const PTS = [10, 6, 3];
const GROUPS = ['A','B','C'];

let db = null;
// 로컬 상태 — Firebase에서 덮어쓰지 않음 (조 편성 탭 활성화 중엔)
let draw = {};   // {raceId: {A:[c,c,c], B:[c,c,c], C:[c,c,c]}}
let winners = {};// {raceId_gi: crew}
let finals = {}; // {raceId: {crew: rank}}
let drawInited = false; // 조편성 UI 최초 1회만 그림

RACES.forEach(r=>{
  draw[r.id] = {A:[null,null,null], B:[null,null,null], C:[null,null,null]};
  finals[r.id] = {};
});

let db_ref;

// ── Firebase ──
window.saveFirebaseConfig = function(){
  const cfg = {
    apiKey: document.getElementById('cfg_apiKey').value.trim(),
    authDomain: document.getElementById('cfg_authDomain').value.trim(),
    databaseURL: document.getElementById('cfg_dbURL').value.trim(),
    projectId: document.getElementById('cfg_projectId').value.trim(),
    appId: document.getElementById('cfg_appId').value.trim(),
    storageBucket:'', messagingSenderId:''
  };
  if(!cfg.apiKey||!cfg.databaseURL||!cfg.projectId){
    showErr('apiKey, databaseURL, projectId는 필수입니다'); return;
  }
  localStorage.setItem('aerc2026_cfg', JSON.stringify(cfg));
  initFirebase(cfg);
};
function showErr(m){ const e=document.getElementById('cfg_error'); e.textContent=m; e.style.display='block'; }

function initFirebase(cfg){
  try{
    const app = initializeApp(cfg);
    db = getDatabase(app);
    db_ref = ref(db, 'aerc2026/state');
    document.getElementById('setupOverlay').style.display='none';
    document.getElementById('syncDot').className='sync-dot live';
    document.getElementById('syncLabel').textContent='실시간 연결됨';

    onValue(db_ref, snap=>{
      const data = snap.val();
      if(data){
        // draw는 조편성 UI가 이미 그려진 상태면 덮어쓰지 않음 (사용자 입력 보호)
        if(!drawInited){
          if(data.draw) draw = data.draw;
          RACES.forEach(r=>{
            if(!draw[r.id]) draw[r.id]={A:[null,null,null],B:[null,null,null],C:[null,null,null]};
          });
          buildDraw();
          drawInited = true;
        }
        if(data.winners) winners = data.winners;
        if(data.finals){
          finals = data.finals;
          RACES.forEach(r=>{ if(!finals[r.id]) finals[r.id]={}; });
        }
      } else {
        if(!drawInited){ buildDraw(); drawInited=true; }
      }
      // 현재 활성 탭만 갱신
      const activeTab = document.querySelector('.tab.active')?.textContent;
      if(activeTab?.includes('예선')) buildPrelim();
      if(activeTab?.includes('결선')){ buildFinal(); updateTotals(); }
    });
  }catch(e){ showErr('연결 실패: '+e.message); }
}

function saveState(){
  const s = { draw, winners, finals };
  localStorage.setItem('aerc2026_state', JSON.stringify(s));
  if(db && db_ref) set(db_ref, s);
}

// ── 조 편성 ──
// DOM 직접 읽어서 state 동기화 (리렌더 없이)
function syncDrawFromDOM(){
  RACES.forEach(r=>{
    GROUPS.forEach((g,gi)=>{
      for(let i=0;i<3;i++){
        const sel = document.getElementById(`dsel_${r.id}_${g}_${i}`);
        if(sel) draw[r.id][g][i] = sel.value || null;
      }
    });
  });
}

window.buildDraw = function(){
  const el = document.getElementById('draw-content');
  let html = '';
  RACES.forEach(r=>{
    const d = draw[r.id] || {A:[null,null,null],B:[null,null,null],C:[null,null,null]};
    html += `<div class="race-card"><div class="race-head">
      <span class="badge ${r.b1}">${r.label.split(' ')[0]}</span>
      <span class="badge ${r.b2}">${r.b2t}</span>
      <span class="race-title-txt">${r.label}</span>
    </div><div class="draw-grid">`;
    GROUPS.forEach(g=>{
      html += `<div class="draw-col"><div class="draw-col-lbl">${g}조</div>`;
      for(let i=0;i<3;i++){
        const cur = (d[g]||[])[i] || '';
        let opts = `<option value="">-- 선택 --</option>`;
        ALL_CREWS.forEach(c=>{ opts += `<option value="${c}" ${cur===c?'selected':''}>${c}</option>`; });
        html += `<select class="draw-sel ${cur?'selected':''}" id="dsel_${r.id}_${g}_${i}" onchange="onDrawChange('${r.id}','${g}',${i},this)">${opts}</select>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html;
};

window.onDrawChange = function(raceId, grp, idx, sel){
  // 중복 체크
  const val = sel.value;
  if(val){
    // 같은 레이스 내 다른 슬롯에 같은 크루가 있으면 경고
    let dup = false;
    GROUPS.forEach(g=>{
      for(let i=0;i<3;i++){
        if(g===grp && i===idx) continue;
        const other = document.getElementById(`dsel_${raceId}_${g}_${i}`);
        if(other && other.value === val){ dup=true; }
      }
    });
    if(dup){ alert(`${val}은 이미 다른 조에 배정되어 있어요!`); sel.value=''; return; }
  }
  // DOM 전체 읽어서 state 저장
  syncDrawFromDOM();
  saveState();
  // 선택된 셀 스타일만 업데이트
  sel.className = sel.value ? 'draw-sel selected' : 'draw-sel';
};

// ── 예선 ──
function getGroups(raceId){
  const d = draw[raceId] || {};
  return GROUPS.map((g,gi)=>({name:g+'조', gi, crews:(d[g]||[]).filter(Boolean)}));
}
function getFinalists(raceId){
  return GROUPS.map((_,gi)=> winners[raceId+'_'+gi] || null);
}

window.buildPrelim = function(){
  const el = document.getElementById('prelim-content');
  let html = '';
  RACES.forEach(r=>{
    const groups = getGroups(r.id);
    const hasAll = groups.every(g=>g.crews.length===3);
    html += `<div class="race-card"><div class="race-head">
      <span class="badge ${r.b1}">${r.label.split(' ')[0]}</span>
      <span class="badge ${r.b2}">${r.b2t}</span>
      <span class="race-title-txt">${r.label}</span>
    </div>`;
    if(!hasAll){
      html += `<div class="empty-state">조 편성을 먼저 완료해 주세요</div>`;
    } else {
      groups.forEach(grp=>{
        const key = r.id+'_'+grp.gi;
        const won = winners[key];
        html += `<div class="group-block"><div class="group-lbl">${grp.name}</div><div class="match-row">`;
        grp.crews.forEach((crew,ci)=>{
          const cls = won ? (won===crew?'winner':'loser') : '';
          html += `<button class="crew-btn ${cls}" onclick="pickWinner('${r.id}',${grp.gi},'${crew}')">${crew}</button>`;
          if(ci<grp.crews.length-1) html += `<span class="vs-lbl">VS</span>`;
        });
        html += `</div></div>`;
      });
      const fin = getFinalists(r.id);
      html += `<div class="finalist-section"><div class="group-lbl" style="margin-bottom:6px">결선 진출</div>
        <div class="finalist-row">${fin.map(f=>f?`<span class="finalist-chip">${f}</span>`:`<span class="finalist-chip empty">미정</span>`).join('')}</div>
      </div>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
};

window.pickWinner = function(raceId, gi, crew){
  winners[raceId+'_'+gi] = crew;
  saveState();
  buildPrelim();
};

// ── 결선 ──
window.buildFinal = function(){
  const el = document.getElementById('final-content');
  let html = '';
  RACES.forEach(r=>{
    const fin = getFinalists(r.id).filter(Boolean);
    html += `<div class="sec-lbl">${r.label}</div><div class="race-card">`;
    if(fin.length < 3){
      html += `<div class="empty-state">예선 승자를 먼저 선택해 주세요 (${fin.length}/3)</div>`;
    } else {
      html += `<div class="final-inner">`;
      fin.forEach((crew,cidx)=>{
        const saved = (finals[r.id]||{})[crew] || '';
        let opts = '<option value="">순위 선택</option>';
        [1,2,3].forEach(rank=>{ opts+=`<option value="${rank}" ${saved==rank?'selected':''}>${rank}위 (${PTS[rank-1]}pt)</option>`; });
        html += `<div class="final-crew-row">
          <span class="crew-name-lbl">${crew}</span>
          <select data-race="${r.id}" data-cidx="${cidx}" onchange="setFinal(this)">${opts}</select>
          <span class="pt-tag ${saved?'filled':''}" id="fpt_${r.id}_${cidx}">${saved?PTS[saved-1]+'pt':'-'}</span>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
  updateTotals();
};

window.setFinal = function(sel){
  const raceId = sel.dataset.race;
  const cidx = parseInt(sel.dataset.cidx);
  const val = sel.value ? parseInt(sel.value) : null;
  const fin = getFinalists(raceId).filter(Boolean);
  const crew = fin[cidx];
  if(!finals[raceId]) finals[raceId]={};
  if(val) finals[raceId][crew]=val;
  else delete finals[raceId][crew];
  saveState();
  const ptEl = document.getElementById(`fpt_${raceId}_${cidx}`);
  if(ptEl){ ptEl.textContent=val?PTS[val-1]+'pt':'-'; ptEl.className=val?'pt-tag filled':'pt-tag'; }
  updateTotals();
};

function updateTotals(){
  const totals={};
  RACES.forEach(r=>{
    Object.entries(finals[r.id]||{}).forEach(([crew,rank])=>{
      if(!rank) return;
      if(!totals[crew]) totals[crew]={total:0,detail:{}};
      const p=PTS[rank-1]||0;
      totals[crew].total+=p; totals[crew].detail[r.id]=p;
    });
  });
  const sorted=Object.entries(totals).sort((a,b)=>b[1].total-a[1].total);
  const el=document.getElementById('total-block');
  if(!el) return;
  if(sorted.length===0){el.innerHTML=`<div class="empty-state">결선 순위를 입력하면 자동 계산됩니다</div>`;return;}
  const medals=['🥇','🥈','🥉','4위','5위','6위','7위','8위','9위'];
  let html=`<table><thead><tr><th style="width:28px"></th><th>크루</th>`;
  RACES.forEach(r=>{html+=`<th>${r.label.split(' ')[0]}<br>${r.b2t}</th>`;});
  html+=`<th style="text-align:right">합계</th></tr></thead><tbody>`;
  sorted.forEach(([crew,data],idx)=>{
    html+=`<tr class="${idx===0?'rank1':''}"><td style="font-size:13px">${medals[idx]||''}</td><td>${crew}</td>`;
    RACES.forEach(r=>{const p=data.detail[r.id];html+=`<td class="${p?'has-pt':''}">${p?p+'pt':'-'}</td>`;});
    html+=`<td class="total-pt">${data.total}pt</td></tr>`;
  });
  html+=`</tbody></table>`;
  el.innerHTML=html;
}

window.goTab = function(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx={draw:0,prelim:1,final:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='prelim') buildPrelim();
  if(name==='final'){ buildFinal(); updateTotals(); }
};

window.resetAll = function(){
  if(!confirm('모든 데이터를 초기화하시겠습니까?')) return;
  RACES.forEach(r=>{
    draw[r.id]={A:[null,null,null],B:[null,null,null],C:[null,null,null]};
    finals[r.id]={};
  });
  winners={};
  drawInited=false;
  saveState();
  buildDraw();
  buildPrelim();
  document.getElementById('final-content').innerHTML='';
  document.getElementById('total-block').innerHTML='<div class="empty-state">결선 순위를 입력하면 자동 계산됩니다</div>';
};

// ── Init ──
const savedCfg = localStorage.getItem('aerc2026_cfg');
if(savedCfg){
  const cfg=JSON.parse(savedCfg);
  document.getElementById('cfg_apiKey').value=cfg.apiKey||'';
  document.getElementById('cfg_authDomain').value=cfg.authDomain||'';
  document.getElementById('cfg_dbURL').value=cfg.databaseURL||'';
  document.getElementById('cfg_projectId').value=cfg.projectId||'';
  document.getElementById('cfg_appId').value=cfg.appId||'';
  initFirebase(cfg);
} else {
  buildDraw();
  drawInited=true;
}
</script>
